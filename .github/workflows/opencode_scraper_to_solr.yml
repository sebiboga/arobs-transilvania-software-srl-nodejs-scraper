name: OpenCode Scraper to Solr

on:
  workflow_dispatch:
    inputs:
      company:
        description: 'Company name to scrape'
        required: true
        default: 'AROBS'
        type: string

jobs:
  scrape-and-push:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Install Chrome
        run: |
          wget -q -O /tmp/google-chrome-keyring https://dl-ssl.google.com/linux/linux_signing_key.pub
          sudo mkdir -p /etc/apt/keyrings
          sudo cp /tmp/google-chrome-keyring /etc/apt/keyrings/google-chrome.asc
          echo "deb [arch=amd64 signed-by=/etc/apt/keyrings/google-chrome.asc] http://dl.google.com/linux/chrome/deb/ stable main" | sudo tee /etc/apt/sources.list.d/google-chrome.list
          sudo apt-get update
          sudo apt-get install -y google-chrome-stable

      - name: Start Chrome with remote debugging
        run: |
          google-chrome --remote-debugging-port=9222 --headless --no-sandbox --disable-dev-shm-usage &
          sleep 3

      - name: Install OpenCode
        run: |
          npm install -g opencode-ai

      - name: Copy opencode.json
        run: |
          cp opencode.json opencode.json.bak
          cat > opencode.json << 'EOF'
          {
            "$schema": "https://opencode.ai/config.json",
            "model": "opencode/big-pickle",
            "mcp": {
              "chrome-devtools": {
                "type": "local",
                "command": ["npx", "-y", "chrome-devtools-mcp@latest", "--browser-url=http://127.0.0.1:9222"]
              },
              "external-directory": {
                "type": "local",
                "command": ["npx", "-y", "external-directory-mcp@latest"]
              }
            }
          }
          EOF

      - name: Company to scrape
        run: |
          echo "Company: ${{ github.event.inputs.company }}"

      - name: Run OpenCode scrape command
        env:
          SOLR_USER: ${{ secrets.SOLR_USER }}
          SOLR_PASSWD: ${{ secrets.SOLR_PASSWD }}
        run: |
          set +x
          
          opencode run "
          Context: Running in GitHub Actions with Chrome DevTools MCP (Chrome on port 9222).

          Solr Configuration:
          - Base URL: https://solr.peviitor.ro
          - Jobs endpoint: https://solr.peviitor.ro/job/update/json?commit=true
          - Company endpoint: https://solr.peviitor.ro/solr/company/update/json?commit=true
          - Auth: Use environment variables SOLR_USER and SOLR_PASSWD with curl -u \"\$SOLR_USER:\$SOLR_PASSWD\"
          - NEVER expose credentials in any output

          Company Model:
          - id: CIF/CUI (8 digits, e.g. '10571572')
          - company: Legal name with DIACRITICS
          - brand: Commercial name (e.g. 'ADP Sector 6')
          - status: 'activ', 'suspendat', 'inactiv', 'radiat'
          - location: Array of cities (e.g. ['București'])
          - website: Array of URLs
          - career: Array of career page URLs
          - lastScraped: Date of scrape
          - scraperFile: Name of scraper file

          Task:
          1. read job model and company model from SCHEMAS.md
          2. Run: /scrape ${{ github.event.inputs.company }}
          3. Extract job data from the company's careers page based on job model
          4. For the company:
             - Search ANAF API to get CIF
             - If CIF found, add/update company in SOLR with: id (CIF), company (official name), brand (input name), location, career (careers URL)
             - Use atomic update if company already exists (set missing fields only)
          5. Push jobs to job core
          6. Output: number of jobs scraped and company details added

          Important!
          1. use job core NOT jobs in solr
          2. company id must be CIF (8 digits), NOT the brand name
          3. if you cannot find CIF, do not add company - just scrape jobs
          4. if you don't have access to tmp use current folder where you have access to create any intermediar file
          "

      - name: Verify data in Solr
        env:
          SOLR_USER: ${{ secrets.SOLR_USER }}
          SOLR_PASSWD: ${{ secrets.SOLR_PASSWD }}
        run: |
          echo "Verify that the company was added correctly with proper id (CIF), company name, and career page"
          echo "The OpenCode step should have already added the company to SOLR"
